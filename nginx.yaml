apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx 
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx 
spec:
  selector:
    app: nginx
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: nginx
spec:
  virtualhost:
    fqdn: nginx.devops.poc
    tls:
      secretName: cert-for-nginx-secret
  routes:
  - conditions:
    - prefix: /
    services:
    - name: nginx
      port: 80